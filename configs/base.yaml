# Base configuration for Late Disambiguation Lag experiments
# All experiments inherit from this and override specific values

# Experiment identification
experiment:
  name: "base"
  seed: 42
  
# Data generation
data:
  # Number of unique B strings (this is n_pairs_effective)
  n_unique_b: 1000
  # K: number of targets per base (bz_to_a: A's per B, az_to_b: A's per B; z redundant)
  k: 1
  # Task direction: "bz_to_a", "az_to_b", "b_to_a", or "a_to_b"
  task: "bz_to_a"
  # String lengths
  b_length: 6
  a_length: 4
  z_length: 2  # selector length (log2(K) bits needed, but we use fixed length)
  # Character vocabulary (excluding special tokens)
  vocab_chars: "abcdefghijklmnopqrstuvwxyz0123456789"
  # Probe split (held-out subset for probes/analysis)
  probe_fraction: 0.0
  # If probes are enabled, split by base string to avoid leakage
  split_by_base: true
  # Enforce distinct first chars for A among the K options per B
  enforce_unique_a_first_char_per_b: false
  # Disambiguation prefix length: number of leading characters in A that are
  # forced unique per B group.  1 = single first char (max K=36 with default
  # vocab), 2 = first two chars (max K=1296).  Only used when
  # enforce_unique_a_first_char_per_b is true.
  disambiguation_prefix_length: 1
  # Label noise: probability of replacing target A with wrong candidate
  # during training. 0.0 = no noise (default). Only affects bz_to_a tasks.
  # Eval/probes always use clean labels regardless of this setting.
  label_noise_prob: 0.0
  
# Tokenizer
tokenizer:
  # Special tokens
  pad_token: "<PAD>"
  bos_token: "<BOS>"
  eos_token: "<EOS>"
  sep_token: "<SEP>"
  
# Model architecture (HookedTransformer)
model:
  n_layers: 4
  n_heads: 4
  d_model: 128
  d_head: 32  # d_model // n_heads
  d_mlp: 512  # 4 * d_model
  act_fn: "gelu"
  # Vocab size will be set dynamically based on tokenizer
  
# Training
training:
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 0.01
  max_steps: 20000
  warmup_steps: 500
  scheduler: "cosine"  # "cosine" (warmup + cosine decay) or "constant" (flat LR)
  # Checkpointing
  checkpoint_every: 200
  eval_every: 100
  
# Probes
probes:
  # Which probes to run
  enabled:
    - attention_to_z
    - logit_lens
    - causal_patching
    - random_z_eval
  # Probe-specific settings
  attention_to_z:
    # Average across batch or keep per-example
    aggregate: true
    # Focus on first target token only
    first_token_only: true
  logit_lens:
    # Use tuned lens if available
    use_tuned_lens: false
    # Focus on first target token only
    first_token_only: true
  causal_patching:
    # Number of examples to use for patching
    n_examples: 256
    # Which layers to patch at
    patch_layers: "all"  # or list of ints
    
# Output paths
output:
  base_dir: "outputs"
  # Will create: {base_dir}/{experiment.name}/checkpoints, probe_results, figures
