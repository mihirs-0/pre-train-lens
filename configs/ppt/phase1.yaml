# Pre-Pre-Training Phase 1 Configuration
# C0 (random init), C1 (Markov), C2 (Shuffle-Dyck), K=10, 6 seeds

experiment:
  name: ppt_phase1
  seeds: [0, 1, 2, 3, 4, 5]
  conditions: ["C0", "C1", "C2"]

# PPT phase params (matched across C1 and C2)
ppt:
  n_steps: 5000
  batch_size: 32
  seq_len: 128
  lr: 3.0e-4
  weight_decay: 1.0e-4
  log_every: 500
  # Shuffle-Dyck
  dyck_k: 5
  dyck_max_depth: 8
  # Markov
  markov_vocab: 50

# Target task params — match existing base.yaml where possible
data:
  task: bz_to_a
  k: 10
  n_unique_b: 1000
  b_length: 6
  a_length: 4
  z_length: 2
  vocab_chars: "abcdefghijklmnopqrstuvwxyz0123456789"
  probe_fraction: 0.0
  split_by_base: false

# Model architecture — MUST match between PPT and target
model:
  n_layers: 4
  n_heads: 4
  d_model: 128
  d_head: 32
  d_mlp: 512
  act_fn: gelu

# Target training
training:
  learning_rate: 1.0e-3
  weight_decay: 0.01
  warmup_steps: 100
  max_steps: 20000
  batch_size: 128
  eval_every: 50
  checkpoint_every: 100
  scheduler: cosine

# Tokenizer
tokenizer:
  pad_token: "<PAD>"
  bos_token: "<BOS>"
  eos_token: "<EOS>"
  sep_token: "<SEP>"

# Evaluation for tau_z
eval:
  z_shuffle_threshold: 0.1
  # Threshold calibration: 0.1 nats ≈ 5% of log(10) ≈ 2.3 nats.
  # Will be calibrated from C0 pilot runs. If C0 z-shuffle noise
  # exceeds 0.1 before conditional learning, raise to 2× noise ceiling.
  candidate_eval_every: 500
  candidate_eval_n_examples: 32
