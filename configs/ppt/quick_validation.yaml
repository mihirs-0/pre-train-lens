# Quick Validation: C0 vs C2, 3 seeds, K=10
# Goal: directional signal on whether Shuffle-Dyck PPT accelerates τ_z

experiment:
  name: ppt_quick_validation
  seeds: [0, 1, 2]
  conditions: ["C0", "C2"]

ppt:
  n_steps: 5000
  batch_size: 32
  seq_len: 128
  lr: 3.0e-4
  weight_decay: 1.0e-4
  log_every: 500
  dyck_k: 5
  dyck_max_depth: 8
  markov_vocab: 50

data:
  task: bz_to_a
  k: 10
  n_unique_b: 1000
  b_length: 6
  a_length: 4
  z_length: 2
  vocab_chars: "abcdefghijklmnopqrstuvwxyz0123456789"
  probe_fraction: 0.0
  split_by_base: false

model:
  n_layers: 4
  n_heads: 4
  d_model: 128
  d_head: 32
  d_mlp: 512
  act_fn: gelu

training:
  learning_rate: 1.0e-3
  weight_decay: 0.01
  warmup_steps: 100
  max_steps: 20000
  batch_size: 128
  eval_every: 50
  checkpoint_every: 2000
  scheduler: cosine

tokenizer:
  pad_token: "<PAD>"
  bos_token: "<BOS>"
  eos_token: "<EOS>"
  sep_token: "<SEP>"

eval:
  z_shuffle_threshold: 0.1
  candidate_eval_every: 500
  candidate_eval_n_examples: 32
