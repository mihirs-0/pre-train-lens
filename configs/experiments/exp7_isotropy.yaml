# Experiment 7: Isotropy Verification (standalone)
# Single seed, dense checkpoints for tracking unembedding geometry.
defaults:
  - ../base

experiment:
  name: "exp7_isotropy"
  seed: 42

data:
  n_unique_b: 1000
  k: 20
  task: "bz_to_a"

training:
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 0.01
  max_steps: 30000
  warmup_steps: 500
  scheduler: "cosine"
  # Every 100 steps for first 5000; every 500 thereafter — handled by script
  checkpoint_every: 100
  eval_every: 50
