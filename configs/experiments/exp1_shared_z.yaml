# Experiment 1 Condition A: Shared z (baseline control)
# K=20, |B|=1000, z shared across all groups — standard task
defaults:
  - ../base

experiment:
  name: "exp1_shared_z"
  seed: 42

data:
  n_unique_b: 1000
  k: 20
  task: "bz_to_a"
  z_sharing: "shared"

training:
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 0.01
  max_steps: 30000
  warmup_steps: 500
  scheduler: "cosine"
  checkpoint_every: 50
  eval_every: 50
